repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: 'node_modules/|frontend/.next/'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: [--config, backend/ruff.toml]
        files: ^backend/
      - id: ruff-format
        args: [--config, backend/ruff.toml]
        files: ^backend/

  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npx eslint --no-warn-ignored "${@/frontend\//}"' --
        language: system
        files: ^frontend/.*\.[jt]sx?$
        exclude: ^frontend/node_modules/

      - id: tsc
        name: tsc (frontend type check)
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/.*\.[jt]sx?$
        exclude: ^frontend/node_modules/
        pass_filenames: false

      - id: vitest
        name: vitest (frontend tests)
        entry: bash -c 'cd frontend && npx vitest run --reporter=dot'
        language: system
        files: ^frontend/.*\.[jt]sx?$
        exclude: ^frontend/node_modules/
        pass_filenames: false

      - id: mypy
        name: mypy (backend type check)
        entry: bash -c 'cd backend && python -m mypy .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: pytest
        name: pytest (backend)
        entry: bash -c 'cd backend && python -m pytest tests/ -x -q'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
