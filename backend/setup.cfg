[tool:pytest]
testpaths = tests
markers =
    emulator: requires Firestore Emulator running on localhost

[coverage:run]
omit =
    tests/*
    scripts/*

[coverage:report]
show_missing = true
skip_covered = true
fail_under = 90
exclude_lines =
    pragma: no cover
    if TYPE_CHECKING:
    if __name__ == .__main__.
